<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Graphic Design Studio Engine | AI Generation Upgrade</title>
    <!-- Tailwind CSS for Interface Layout -->
    <script src="https://tailwindcss.com"></script>
    <!-- Fabric.js Vector Canvas Engine Sourced Safely -->
    <script src="https://cloudflare.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Top Studio Controlling Nav Panel -->
    <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex justify-between items-center">
        <h1 class="text-lg font-bold tracking-wider text-amber-500">CLOUD-DESIGN <span class="text-white text-xs font-mono ml-2">v1.1 AI Engine</span></h1>
        <div class="flex space-x-3">
            <button onclick="exportCanvasJSON()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-4 py-2 rounded transition">
                Export Database JSON
            </button>
            <button onclick="downloadPNG()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-black px-4 py-2 rounded transition">
                Download PNG
            </button>
        </div>
    </header>

    <!-- Main Workspace Configuration Screen -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Side Tool Assembly Rack -->
        <aside class="w-72 bg-slate-950 border-r border-slate-800 p-4 space-y-6 flex flex-col justify-start overflow-y-auto">
            
            <!-- Standard Vectors Group -->
            <div>
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Workspace Controls</div>
                <div class="space-y-2">
                    <button onclick="addTextBox()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs text-left px-4 py-3 rounded flex items-center transition">
                        <span class="mr-3 font-mono font-bold text-amber-500">T</span> Add Text Element
                    </button>
                    <button onclick="addRectangle()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs text-left px-4 py-3 rounded flex items-center transition">
                        <span class="mr-3 font-mono font-bold text-amber-500">■</span> Add Base Rectangle
                    </button>
                </div>
            </div>
            
            <!-- Generative AI Generator Engine Box Layout -->
            <div class="border-t border-slate-800 pt-4">
                <div class="text-xs font-bold text-amber-500 uppercase tracking-wider mb-2">✨ AI Text-To-Image Lab</div>
                <div class="space-y-3">
                    <textarea id="aiPrompt" rows="3" placeholder="Describe your asset scene (e.g., 'Modern naval ship firing radar guided missiles, cinematic dramatic lighting, digital art style')..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-xs text-slate-200 focus:outline-none focus:border-amber-500 resize-none"></textarea>
                    
                    <button id="generateBtn" onclick="generateAIAsset()" class="w-full bg-gradient-to-r from-amber-600 to-amber-500 text-slate-950 text-xs font-black py-2.5 rounded hover:from-amber-500 hover:to-amber-400 transition flex justify-center items-center">
                        <span id="btnText">Generate Vector Asset</span>
                        <span id="btnSpinner" class="hidden animate-spin rounded-full h-4 w-4 border-2 border-slate-950 border-t-transparent ml-2"></span>
                    </button>
                </div>
            </div>

            <div class="border-t border-slate-800 pt-4">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Upload Asset</label>
                <input type="file" id="imageLoader" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-slate-800 file:text-slate-200 hover:file:bg-slate-700 cursor-pointer"/>
            </div>

            <div class="border-t border-slate-800 pt-4 flex-1 flex flex-col justify-end">
                <button onclick="clearCanvas()" class="w-full bg-red-950/40 hover:bg-red-900/60 border border-red-800 text-red-200 text-xs font-bold py-2.5 rounded transition">
                    Clear Canvas Grid
                </button>
            </div>
        </aside>

        <!-- Central Sandbox Engineering Canvas Area -->
        <main class="flex-1 flex justify-center items-center bg-slate-900 p-8 overflow-auto">
            <div class="shadow-2xl border-4 border-slate-950 bg-white rounded-sm overflow-hidden">
                <canvas id="studioCanvas" width="800" height="450"></canvas>
            </div>
        </main>
    </div>

    <!-- Application Initialization Scripts Engine -->
    <script>
        // Mount Interactive Canvas Vector Layer Matrix
        const canvas = new fabric.Canvas('studioCanvas', {
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // Tool Macro: Add Text Dynamic Object Layer Box
        function addTextBox() {
            const text = new fabric.IText('Edit This Layer Text', {
                left: 100,
                top: 150,
                fontFamily: 'Helvetica',
                fill: '#0f172a',
                fontSize: 32
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // Tool Macro: Add Rectangle Primitive Base Object Layer
        function addRectangle() {
            const rect = new fabric.Rect({
                left: 250,
                top: 120,
                fill: '#f59e0b',
                width: 150,
                height: 100
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        }

        // Deep AI Cloud Sourcing Pipeline Execution Block
        async function generateAIAsset() {
            const promptInput = document.getElementById('aiPrompt').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            if (!promptInput) {
                alert("Please input a text description for your custom AI asset layer matrix execution.");
                return;
            }

            // UI Loading state locking
            generateBtn.disabled = true;
            btnText.innerText = "Synthesizing Image...";
            btnSpinner.classList.remove('hidden');

            try {
                // Post network operation to secure custom cloud server instance running on localhost
                const response = await fetch('http://localhost:5000/api/generate-ai-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput })
                });

                const data = await response.json();

                if (data.image) {
                    // Inject base64 data stream smoothly into canvas workspace stack array
                    fabric.Image.fromURL(data.image, function(img) {
                        img.set({ left: 150, top: 50 });
                        img.scaleToWidth(400); // Standard sizing bounds
                        canvas.add(img);
                        canvas.renderAll();
                    });
                } else {
                    alert("Error: Server processing chain failed to compile base64 image data.");
                }

            } catch (err) {
                console.error(err);
                alert("Could not link to secure local backend microservice. Confirm port 5000 execution state.");
            } finally {
                // Restore interactive control configuration layouts
                generateBtn.disabled = false;
                btnText.innerText = "Generate Vector Asset";
                btnSpinner.classList.add('hidden');
            }
        }

        // Local asset processing engine pipelines mapping
        document.getElementById('imageLoader').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    img.set({ left: 200, top: 100 });
                    img.scaleToWidth(300);
                    canvas.add(img);
                    canvas.renderAll();
                });
            }
            reader.readAsDataURL(e.target.files);
        });

        function exportCanvasJSON() {
            console.log(JSON.stringify(canvas.toJSON()));
            alert("Canvas structure compiled to console log matrix successfully.");
        }

        function downloadPNG() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
            const link = document.createElement('a');
            link.download = 'ai-studio-layout.png';
            link.href = dataURL;
            link.click();
        }

        function clearCanvas() {
            if(confirm("Confirm erasure operations for workspace state?")) {
                canvas.clear();
                canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
            }
        }
    </script>
</body>
</html>
